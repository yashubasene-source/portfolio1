<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Reel Not Found | Anshay Basene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #a855f7;
      --bg: #080808;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Film grain */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
      animation: grain 6s steps(8) infinite;
    }
    @keyframes grain {
      0%,100%{transform:translate(0,0)} 10%{transform:translate(-2%,-4%)}
      20%{transform:translate(-6%,2%)} 30%{transform:translate(3%,-10%)}
      40%{transform:translate(-3%,5%)} 50%{transform:translate(-6%,3%)}
      60%{transform:translate(5%,-8%)} 70%{transform:translate(3%,7%)}
      80%{transform:translate(-7%,-3%)} 90%{transform:translate(5%,5%)}
    }

    /* Glow bg */
    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.12), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Timecode corner */
    .timecode {
      position: fixed;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: rgba(168,85,247,0.25);
      letter-spacing: 3px;
    }
    .timecode-tl { top: 24px; left: 24px; }
    .timecode-br { bottom: 24px; right: 24px; }

    /* Main content */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 24px;
    }

    /* Film slate 404 */
    .slate-404 {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin-bottom: 40px;
    }
    .slate-left {
      background: repeating-linear-gradient(-45deg, #1a1a1a 0, #1a1a1a 16px, #111 16px, #111 32px);
      border: 2px solid #333;
      border-right: none;
      border-radius: 12px 0 0 12px;
      padding: 20px 28px;
    }
    .slate-right {
      background: #0d0d0d;
      border: 2px solid #333;
      border-left: none;
      border-radius: 0 12px 12px 0;
      padding: 20px 28px;
    }
    .slate-num {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 40px rgba(168,85,247,0.5);
    }
    .slate-divider {
      width: 3px;
      background: var(--accent);
      height: 100%;
      align-self: stretch;
      box-shadow: 0 0 12px var(--accent);
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    h1 span { color: var(--accent); }

    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 40px;
    }

    .btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 28px rgba(168,85,247,0.35);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(168,85,247,0.5); }
    .btn-outline {
      background: transparent;
      color: #aaa;
      border: 1px solid #2a2a2a;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* Scanning line */
    .scan-line {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(168,85,247,0.4), transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes scan {
      0% { top: 0%; } 100% { top: 100%; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="scan-line"></div>
  <div class="timecode timecode-tl">ANSHAY.PORTFOLIO — ERR:404</div>
  <div class="timecode timecode-br" id="tc-br">00:00:00:00</div>

  <div class="container">
    <div class="slate-404">
      <div class="slate-left">
        <div class="slate-num">4</div>
      </div>
      <div class="slate-divider"></div>
      <div class="slate-right">
        <div class="slate-num" style="color:#fff;">04</div>
      </div>
    </div>

    <h1><span>Reel Not Found.</span></h1>
    <p>
      Looks like this frame was cut in the edit.<br>
      Even the best directors take wrong turns — let's get you back on set.
    </p>

    <div class="btns">
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-clapperboard"></i> Back to Portfolio
      </a>
      <a href="index.html#contact" class="btn btn-outline">
        <i class="fas fa-envelope"></i> Contact Me
      </a>
    </div>
  </div>

  <script>
    // Live timecode
    function updateTC() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      const f = String(Math.floor((now.getMilliseconds() / 1000) * 24)).padStart(2,'0');
      document.getElementById('tc-br').textContent = `${h}:${m}:${s}:${f}`;
    }
    setInterval(updateTC, 42);
  </script>
</body>
</html>
